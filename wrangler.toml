name = "FlareDrive-R2-Workers"
main = "src/index.js"
compatibility_date = "2024-01-01"

# R2 存储桶绑定 - 替换为你的 R2 桶名
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "store"

# 静态资源绑定 (Workers Static Assets)
# 部署前确保 public 目录包含 index.html 和 assets/
[assets]
directory = "./public"

# 环境变量
[vars]
# 访客访问权限（逗号分隔的路径列表，* 表示全部访问）
GUEST = ""