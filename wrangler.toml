name = "flaredrive-r2"
main = "src/index.js"
compatibility_date = "2024-01-01"

# R2 存储桶绑定 - 替换为你的 R2 桶名
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "your-bucket-name"

# 静态资源绑定 (Workers Static Assets)
# 部署前确保 public 目录包含 index.html 和 assets/
[assets]
directory = "./public"
binding = "ASSETS"

# 环境变量
[vars]
# R2 公开访问 URL（用于 /raw/ 路径代理，格式：https://pub-xxx.r2.dev 或自定义域名）
PUBURL = "https://your-puburl.r2.dev"
# Cloudflare 账号 ID（用于 S3 API）
CF_ACCOUNT_ID = "your-account-id"
# R2 S3 访问密钥
AWS_ACCESS_KEY_ID = "your-access-key-id"
# R2 S3 访问密钥
AWS_SECRET_ACCESS_KEY = "your-secret-access-key"
# 访客访问权限（逗号分隔的路径列表，* 表示全部访问）
GUEST = "*"
